<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HONEX RP - HUD</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* მთავარი ოქროსფერი პალიტრა */
            --main-gold: #ffcc00;
            --dark-gold: #b38f00;
            --glow-gold: rgba(255, 204, 0, 0.4);
            --glass-bg: rgba(15, 15, 18, 0.85);
            --glass-border: rgba(255, 204, 0, 0.3);
            --hp-color: #ff4d4d; /* სიცოცხლე - წითელი */
            --armor-color: #e6e6e6; /* ჯავშანი - თეთრი/ნაცრისფერი */
        }

        html, body {
            background: transparent !important;
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            height: 100vh;
            overflow: hidden;
            pointer-events: none; /* ეს არ აძლევს მაუსს გაჭედვის საშუალებას! */
        }

        /* ზომების შემცირება: სიგანე 260px */
        .hud-wrapper {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: absolute;
            top: 25px;
            right: 25px;
        }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        /* === ლოგო და ზედა სტატუსი === */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5px;
        }

        .logo-container { line-height: 0.9; }
        .logo-code { font-size: 14px; letter-spacing: 1px; color: #ccc; font-weight: 700; }
        .logo-forge {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px; 
            font-weight: 700;
            color: var(--main-gold);
            text-shadow: 0 0 8px var(--glow-gold);
            font-style: italic;
        }

        .stats-group {
            display: flex;
            gap: 5px;
            font-size: 12px;
        }

        .stat-box {
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* === იარაღი, HP და ARMOR სექცია === */
        .status-card {
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .weapon-box {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--dark-gold);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(255, 204, 0, 0.1);
        }

        .weapon-box img { max-width: 85%; max-height: 85%; }

        .bars-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bar-wrapper {
            position: relative;
            height: 14px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .hp-fill { background: var(--hp-color); width: 100%; }
        .armor-fill { background: var(--armor-color); width: 0%; }

        .bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 1px 1px 2px black;
        }

        /* პერსონაჟის ინფო */
        .role-info {
            text-align: right;
            padding: 0 5px;
            margin-top: -4px;
            margin-bottom: 4px;
        }
        .role-info p { margin: 0; line-height: 1.2; }
        .role-name { font-size: 16px; font-weight: bold; color: var(--main-gold); text-transform: uppercase; }
        .role-rank { font-size: 12px; color: #aaa; font-style: italic; }

        /* === ფულის სექცია === */
        .money-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .money-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-left: 3px solid var(--main-gold);
        }

        .money-icon { font-size: 14px; font-weight: bold; }

        .amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px; 
            font-weight: 700;
            letter-spacing: 1px;
        }

        .bank-amount { color: #a3e4d7; } 
        .cash-amount { color: #82e0aa; } 
        .bonus-amount { color: #ff4d4d; }

        /* === სპიდომეტრი === */
        #speedometer {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: var(--glass-bg);
            border-left: 4px solid var(--main-gold);
            padding: 15px 25px;
            transform: skewX(-15deg);
            display: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .speed-val {
            font-size: 52px;
            font-weight: 900;
            color: var(--main-gold);
            text-shadow: 3px 3px 0px black;
            font-family: 'Orbitron', sans-serif;
        }

        /* ანიმაციები */
        @keyframes flashRed { 0% { transform: scale(1); color: inherit; } 50% { transform: scale(1.15); color: #ff4d4d; } 100% { transform: scale(1); color: inherit; } }
        @keyframes flashGreen { 0% { transform: scale(1); color: inherit; } 50% { transform: scale(1.15); color: #2ecc71; } 100% { transform: scale(1); color: inherit; } }
        .anim-red { animation: flashRed 0.4s ease-in-out; }
        .anim-green { animation: flashGreen 0.4s ease-in-out; }

    </style>
</head>
<body>

    <div class="hud-wrapper">
        <div class="header-top">
            <div class="logo-container">
                <span class="logo-code">HONEX</span>
                <span class="logo-forge">RP</span>
            </div>
            <div class="stats-group">
                <div class="stat-box glass-panel">👥 <b id="hud-online">0</b></div>
                <div class="stat-box glass-panel">🆔 <b id="hud-myid">0</b></div>
            </div>
        </div>

        <div class="status-card glass-panel">
            <div class="weapon-box">
                <img id="hud-weapon" src="weapons/0.png" alt="Weapon">
            </div> 
            
            <div class="bars-container">
                <div class="bar-wrapper">
                    <div class="bar-fill hp-fill" id="hud-hp-fill"></div>
                    <span class="bar-text" id="hud-hp-text">100 HP</span>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-fill armor-fill" id="hud-armor-fill"></div>
                    <span class="bar-text" id="hud-armor-text">0 AP</span>
                </div>
            </div>
        </div>

        <div class="role-info">
            <p class="role-name" id="hud-job">CITIZEN</p>
            <p class="role-rank" id="hud-rank">Civilian Member</p>
        </div>

        <div class="money-group">
            <div class="money-box glass-panel">
                <span class="money-icon"><i class="fas fa-building-columns"></i> ბანკი</span>
                <span class="amount bank-amount" id="hud-bank">$ 0</span>
            </div>

            <div class="money-box glass-panel">
                <span class="money-icon"><i class="fas fa-money-bill-wave" style="color:#2ecc71;"></i> ხელზე</span>
                <span class="amount cash-amount" id="hud-cash">$ 0</span>
            </div>

            <div class="money-box glass-panel">
                <span class="money-icon" style="color:#ff4d4d;"><i class="fas fa-gift"></i> ბონუსი</span>
                <span class="amount bonus-amount" id="hud-bonus">0H 00M</span>
            </div>
        </div>
    </div>

    <div id="speedometer">
        <div style="transform: skewX(15deg); text-align:right;">
            <div id="speed" class="speed-val">000</div>
            <div style="font-size:14px; letter-spacing:2px; font-weight:900;">KM/H</div>
            <div style="margin-top:10px; font-weight:800; color:#f1c40f;">
                <i class="fas fa-gas-pump"></i> <span id="fuel">100</span>L
            </div>
        </div>
    </div>

    <script>
        let lastHp = 100, lastArmor = 0, lastCash = 0, lastBank = 0;

        function playAnim(id, cls) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('anim-red', 'anim-green');
            void el.offsetWidth;
            el.classList.add(cls);
        }

        if (typeof cef !== 'undefined') {
            cef.on("updateHUD", function(hp, armor, cash, bank, weaponid, myid, online, job, rank) {
                if(hp < lastHp) playAnim('hud-hp-text', 'anim-red');
                else if(hp > lastHp) playAnim('hud-hp-text', 'anim-green');
                document.getElementById('hud-hp-fill').style.width = hp + '%';
                document.getElementById('hud-hp-text').innerText = Math.round(hp) + ' HP';
                lastHp = hp;

                if(cash < lastCash) playAnim('hud-cash', 'anim-red');
                else if(cash > lastCash) playAnim('hud-cash', 'anim-green');
                document.getElementById('hud-cash').innerText = '$ ' + cash.toLocaleString();
                lastCash = cash;

                if(bank < lastBank) playAnim('hud-bank', 'anim-red');
                else if(bank > lastBank) playAnim('hud-bank', 'anim-green');
                document.getElementById('hud-bank').innerText = '$ ' + bank.toLocaleString();
                lastBank = bank;

                document.getElementById('hud-armor-fill').style.width = armor + '%';
                document.getElementById('hud-armor-text').innerText = Math.round(armor) + ' AP';
                document.getElementById('hud-myid').innerText = myid;
                document.getElementById('hud-online').innerText = online;
                document.getElementById('hud-job').innerText = job.toUpperCase();
                document.getElementById('hud-rank').innerText = rank;
                document.getElementById('hud-weapon').src = "weapons/" + weaponid + ".png";
            });

            cef.on("updateSpeedo", function(speed, fuel, vhp, eng, light, door, in_veh) {
                const sp = document.getElementById("speedometer");
                if (!in_veh) { sp.style.display = "none"; return; }
                sp.style.display = "block";
                document.getElementById("speed").innerText = speed.toString().padStart(3, '0');
                document.getElementById("fuel").innerText = fuel;
            });

            cef.on("updateBonus", function(timeStr) {
                document.getElementById('hud-bonus').innerText = timeStr;
            });
        }
    </script>
</body>
</html>
