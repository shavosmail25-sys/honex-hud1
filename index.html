<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Forge Gold HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            /* მთავარი ოქროსფერი პალიტრა */
            --main-gold: #ffcc00;
            --dark-gold: #b38f00;
            --glow-gold: rgba(255, 204, 0, 0.4);
            --glass-bg: rgba(15, 15, 18, 0.85);
            --glass-border: rgba(255, 204, 0, 0.3);
            --hp-color: #ff4d4d; /* სიცოცხლე - წითელი */
            --armor-color: #e6e6e6; /* ჯავშანი - თეთრი/ნაცრისფერი */
        }

        body {
            background-color: #1a1e24; /* სატესტო ფონი */
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            height: 100vh;
        }

        /* ზომების შემცირება: სიგანე ახლა 260px-ია (იყო 380px) */
        .hud-wrapper {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        /* === ლოგო და ზედა სტატუსი === */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5px;
        }

        .logo-container { line-height: 0.9; }
        .logo-code { font-size: 12px; letter-spacing: 1px; color: #ccc; }
        .logo-forge {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px; /* დაპატარავდა */
            font-weight: 700;
            color: var(--main-gold);
            text-shadow: 0 0 8px var(--glow-gold);
            font-style: italic;
        }

        .stats-group {
            display: flex;
            gap: 5px;
            font-size: 12px;
        }

        .stat-box {
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-box span { color: #aaa; }

        /* === იარაღი, HP და ARMOR სექცია === */
        .status-card {
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* იარაღის (Fist) ყუთი */
        .weapon-box {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--dark-gold);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: inset 0 0 10px rgba(255, 204, 0, 0.1);
        }

        .bars-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bar-wrapper {
            position: relative;
            height: 14px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .hp-fill { background: var(--hp-color); width: 85%; }
        .armor-fill { background: var(--armor-color); width: 45%; }

        .bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 1px 1px 2px black;
        }

        /* პერსონაჟის ინფო */
        .role-info {
            text-align: right;
            padding: 0 5px;
            margin-top: -4px;
            margin-bottom: 4px;
        }
        .role-info p { margin: 0; line-height: 1.2; }
        .role-name { font-size: 16px; font-weight: bold; color: var(--main-gold); }
        .role-rank { font-size: 12px; color: #aaa; }

        /* === ფულის სექცია === */
        .money-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .money-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-left: 3px solid var(--main-gold);
        }

        .money-icon { font-size: 16px; }

        .amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px; /* დაპატარავდა */
            font-weight: 700;
            letter-spacing: 1px;
        }

        .bank-amount { color: #a3e4d7; } /* ბანკის ფული ოდნავ მოცისფრო/თეთრი */
        .cash-amount { color: #82e0aa; } /* ხელზე ფული მწვანე */

    </style>
</head>
<body>

    <div class="hud-wrapper">
        <div class="header-top">
            <div class="logo-container">
                <span class="logo-code">CODE</span>
                <span class="logo-forge">FORGE</span>
            </div>
            <div class="stats-group">
                <div class="stat-box glass-panel">👥 <b>110</b><span>/300</span></div>
                <div class="stat-box glass-panel">🆔 <b>21</b></div>
            </div>
        </div>

        <div class="status-card glass-panel">
            <div class="weapon-box">✊</div> 
            
            <div class="bars-container">
                <div class="bar-wrapper">
                    <div class="bar-fill hp-fill"></div>
                    <span class="bar-text">85 HP</span>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-fill armor-fill"></div>
                    <span class="bar-text">45 AP</span>
                </div>
            </div>
        </div>

        <div class="role-info">
            <p class="role-name">Sheriff</p>
            <p class="role-rank">Official Officer</p>
        </div>

        <div class="money-group">
            <div class="money-box glass-panel">
                <span class="money-icon">💳 ბანკი</span>
                <span class="amount bank-amount">$ 55.200.186</span>
            </div>

            <div class="money-box glass-panel">
                <span class="money-icon">💵 ხელზე</span>
                <span class="amount cash-amount">$ 108.956</span>
            </div>
        </div>
    </div>

</body>
</html>
