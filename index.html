<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Montserrat', sans-serif; background: transparent; }
        .server-name { position: absolute; top: 15px; right: 25px; font-family: 'Montserrat', sans-serif; font-size: 18px; background: linear-gradient(180deg, #f1c40f 0%, #d35400 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transform: skewX(-15deg); font-weight: 900; z-index: 100; }
        #hud-container { position: absolute; top: 50px; right: 25px; display: flex; flex-direction: column; align-items: flex-end; transform: skewX(-15deg); }
        .money-wrapper { font-size: 32px; color: #2ecc71; text-shadow: 2px 2px 0px rgba(0,0,0,0.9); margin-bottom: 5px; }
        .stat-item { display: flex; align-items: center; margin-bottom: 5px; background: rgba(0, 0, 0, 0.5); padding: 3px 10px; }
        .bar-bg { width: 150px; height: 8px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .fill { height: 100%; transition: width 0.3s ease-in-out; }
        #hp-fill { background: linear-gradient(90deg, #d31027, #ea384d); width: 100%; } 
        #arm-fill { background: linear-gradient(90deg, #2b5876, #4e4376); width: 0%; } 
        #register-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) skewX(-5deg); background: rgba(10, 10, 10, 0.95); border-top: 3px solid #f1c40f; border-bottom: 3px solid #f1c40f; padding: 40px; width: 400px; display: none; z-index: 9999; }
        #register-box .content { transform: skewX(5deg); }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #f1c40f; }
        .input-group input { width: 100%; padding: 12px 15px 12px 45px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; outline: none; }
        .gender-select { display: flex; gap: 10px; margin-bottom: 25px; }
        .gender-btn { flex: 1; padding: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; cursor: pointer; font-family: 'Oswald'; }
        .gender-btn.active { background: #f1c40f; color: #000; }
        .submit-btn { width: 100%; padding: 12px; background: linear-gradient(90deg, #f1c40f, #d35400); border: none; color: #fff; font-family: 'Oswald'; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #skin-box { position: absolute; left: 50px; top: 50%; transform: translateY(-50%) skewX(-5deg); background: rgba(10, 10, 10, 0.95); border-left: 3px solid #f1c40f; padding: 25px; width: 350px; display: none; z-index: 9999; }
        .skin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; overflow-y: auto; max-height: 500px; }
        .skin-card { background: rgba(255,255,255,0.05); padding: 10px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .skin-card:hover { border-color: #f1c40f; background: rgba(255,255,255,0.1); }
        .skin-card img { height: 120px; object-fit: contain; pointer-events: none; }
        .skin-btn { width: 100%; background: #f1c40f; border: none; padding: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="server-name" id="logo-main">HONEX ROLE PLAY</div>
    <div id="hud-container">
        <div class="money-wrapper" id="money-cont">$ <span id="money">0</span></div>
        <div class="stat-item"><div class="bar-bg"><div id="hp-fill" class="fill"></div></div></div>
        <div class="stat-item"><div class="bar-bg"><div id="arm-fill" class="fill"></div></div></div>
    </div>

    <div id="register-box">
        <div class="content">
            <div style="text-align:center; margin-bottom:20px;"><h1 style="color:#f1c40f; margin:0;">HONEX RP</h1><span style="color:#fff;">რეგისტრაცია</span></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="reg-pass" placeholder="პაროლი"></div>
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="reg-mail" placeholder="მეილი"></div>
            <div class="gender-select">
                <button class="gender-btn active" id="btn-male" onclick="selectGender(1)">კაცი</button>
                <button class="gender-btn" id="btn-female" onclick="selectGender(2)">ქალი</button>
            </div>
            <button class="submit-btn" onclick="sendRegisterData()">რეგისტრაცია</button>
        </div>
    </div>

    <div id="skin-box">
        <div class="content">
            <div style="color:#fff; text-align:center; margin-bottom:15px; font-family:'Oswald'; font-size: 20px;">აირჩიე პერსონაჟი</div>
            <div class="skin-grid" id="skin-grid-container"></div>
        </div>
    </div>

    <script>
        let selectedGender = 1;
        const maleSkins = [7, 14, 15, 18, 19, 20, 21, 22, 23, 24, 25, 26];
        const femaleSkins = [9, 10, 11, 12, 13, 31, 38, 39, 40, 41, 54, 56];

        if (typeof cef !== 'undefined') {
            cef.on("showRegisterWindow", () => { document.getElementById('register-box').style.display = 'block'; });
            cef.on("showSkinSelector", (gender) => {
                document.getElementById('register-box').style.display = 'none';
                document.getElementById('skin-box').style.display = 'block';
                const grid = document.getElementById('skin-grid-container');
                grid.innerHTML = '';
                const skins = (gender === 1) ? maleSkins : femaleSkins;
                skins.forEach(id => {
                    grid.innerHTML += `<div class="skin-card" onclick="selectSkin(${id})"><img src="https://img.open.mp/skins/${id}.png"><button class="skin-btn">არჩევა</button></div>`;
                });
            });
            cef.on("hideSkinSelector", () => { document.getElementById('skin-box').style.display = 'none'; });
        }

        function selectGender(g) {
            selectedGender = g;
            document.getElementById('btn-male').classList.toggle('active', g===1);
            document.getElementById('btn-female').classList.toggle('active', g===2);
        }

        function sendRegisterData() {
            const p = document.getElementById('reg-pass').value;
            const m = document.getElementById('reg-mail').value;
            if(p.length < 4) return;
            if(typeof cef !== 'undefined') cef.emit("cef_server_onRegisterInput", p, p.length, m, selectedGender);
        }

        function selectSkin(id) {
            // ღილაკზე დაჭერისას ეგრევე ვმალავთ UI-ს
            document.getElementById('skin-box').style.display = 'none';
            document.getElementById('hud-container').style.display = 'flex';
            document.getElementById('logo-main').style.display = 'block';
            if(typeof cef !== 'undefined') cef.emit("cef_server_onSkinSelect", id);
        }
    </script>
</body>
</html>
